      /* Toast animation */
      .toast-enter-active {
        animation: toast-in 0.3s ease;
      }
      @keyframes toast-in {
        from {
          opacity: 0;
          transform: translateX(-50%) translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateX(-50%) translateY(0);
        }
      }

      /* Stats panel slide transition */
      .stats-enter-active {
        transition: opacity 0.2s ease;
      }
      .stats-enter-active .fixed.right-0 {
        transition: transform 0.25s ease;
      }
      .stats-enter-from {
        opacity: 0;
      }
      .stats-enter-from .fixed.right-0 {
        transform: translateX(100%);
      }
      .stats-leave-active {
        transition: opacity 0.2s ease;
      }
      .stats-leave-active .fixed.right-0 {
        transition: transform 0.2s ease;
      }
      .stats-leave-to {
        opacity: 0;
      }
      .stats-leave-to .fixed.right-0 {
        transform: translateX(100%);
      }

      /* Mastery dropdown expand/collapse */
      .mastery-enter-active {
        transition: all 0.25s ease;
      }
      .mastery-leave-active {
