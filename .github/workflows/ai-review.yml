name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: AI Code Review
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEEPSEEK_API_KEY: ${{ secrets.LLM_API_KEY }}
        run: |
          set -e

          PR_NUM=${{ github.event.pull_request.number }}
          REPO=${{ github.repository }}

          DIFF=$(gh pr diff "$PR_NUM" --repo "$REPO" | head -c 8000)

          if [ -z "$DIFF" ]; then
            gh pr comment "$PR_NUM" --repo "$REPO" \
              --body "## AI 代码审查 (DeepSeek)

          :warning: 此 PR 没有 diff，跳过审查。

          ---
          *此审查由 DeepSeek AI 自动生成*"
            exit 0
          fi

          REQ_BODY=$(jq -n \
            --arg model "deepseek-chat" \
            --arg diff "$DIFF" \
            '{
              model: $model,
              max_tokens: 1000,
              messages: [
                {role: "system", content: "你是一个资深代码审查员。请用中文审查以下 PR 代码变更。重点关注：潜在 bug 或逻辑错误、安全漏洞、性能问题、代码质量。如果没有问题请简要说明。限制 500 字以内。"},
                {role: "user", content: "请审查以下 PR diff:\n\n```diff\n\($diff)\n```"}
              ]
            }')

          RESPONSE=$(curl -s --max-time 120 \
            https://api.deepseek.com/v1/chat/completions \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $DEEPSEEK_API_KEY" \
            -d "$REQ_BODY")

          REVIEW_TEXT=$(echo "$RESPONSE" | jq -r '.choices[0].message.content' 2>/dev/null || true)

          if [ -z "$REVIEW_TEXT" ] || [ "$REVIEW_TEXT" = "null" ]; then
            ERROR_MSG=$(echo "$RESPONSE" | jq -r '.error.message' 2>/dev/null || true)
            RAW=$(echo "$RESPONSE" | head -c 500)
            if [ -n "$ERROR_MSG" ] && [ "$ERROR_MSG" != "null" ]; then
              REVIEW_TEXT=":warning: DeepSeek API 返回错误: **${ERROR_MSG}**"
            else
              REVIEW_TEXT=":x: AI 审查未能完成，请手动检查代码。"
            fi
            echo "API response: $RAW"
          fi

          # Write body to temp file to avoid heredoc escaping issues
          BODY_FILE=$(mktemp)
          printf '## AI 代码审查 (DeepSeek)\n\n%s\n\n---\n*此审查由 DeepSeek AI 自动生成 | PR #%s*\n' \
            "$REVIEW_TEXT" "$PR_NUM" > "$BODY_FILE"

          gh pr comment "$PR_NUM" --repo "$REPO" --body-file "$BODY_FILE"

          echo "Review posted successfully."
