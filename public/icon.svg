<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Pencil/edit icon -->
  <g transform="translate(100,80)" fill="none" stroke="white" stroke-width="28" stroke-linecap="round" stroke-linejoin="round">
    <!-- Pencil body -->
    <path d="M48 320 L200 168 L312 280 L160 432 Z" fill="rgba(255,255,255,0.2)"/>
    <path d="M48 320 L160 432 L48 432 Z" fill="rgba(255,255,255,0.15)"/>
    <!-- Pencil lines -->
    <line x1="200" y1="168" x2="312" y2="280"/>
    <!-- Tip -->
    <line x1="48" y1="320" x2="120" y2="248"/>
    <line x1="120" y1="248" x2="200" y2="168"/>
  </g>
  <!-- Wrong answer = red X -->
  <g transform="translate(200,340)">
    <circle cx="30" cy="30" r="28" fill="none" stroke="#fca5a5" stroke-width="8"/>
    <line x1="16" y1="16" x2="44" y2="44" stroke="#ef4444" stroke-width="10" stroke-linecap="round"/>
    <line x1="44" y1="16" x2="16" y2="44" stroke="#ef4444" stroke-width="10" stroke-linecap="round"/>
  </g>
  <!-- Correct answer = green check -->
  <g transform="translate(280,340)">
    <circle cx="30" cy="30" r="28" fill="none" stroke="#bbf7d0" stroke-width="8"/>
    <polyline points="14,30 24,40 46,18" fill="none" stroke="#22c55e" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
